<!DOCTYPE html> <html lang="cs"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"> <title>Slate Lab</title> <style> :root { /* ---- Graphite palette (monochrome — no saturated accent) ---- */ --bg: #17181a; --surface: #1f2124; --surface-raised: #2a2c30; --text: #eceef0; --text-dim: #85888d; --accent: #eceef0; --accent-dim: #b8bbc0; --border: #313437; /* The photo itself stays on a neutral dark surround regardless of the UI theme — same reason every photo app (Lightroom, VSCO, Snapseed) keeps a dark canvas even in a light theme: a bright surround biases how you judge exposure and color in the image itself. */ --stage-bg: #121212; --stage-chrome-bg: rgba(20, 20, 22, 0.82); --stage-chrome-border: rgba(255, 255, 255, 0.14); --stage-chrome-text: #eceef0; --top-bar-height: 50px; --nav-height: 68px; --safe-bottom: env(safe-area-inset-bottom, 0px); --safe-top: env(safe-area-inset-top, 0px); --ease: cubic-bezier(0.32, 0.72, 0, 1); } * { box-sizing: border-box; } html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none; } button { font-family: inherit; } /* ---------- Top bar ---------- */ #top-bar { position: fixed; top: 0; left: 0; right: 0; height: calc(var(--top-bar-height) + var(--safe-top)); padding-top: var(--safe-top); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding-left: 4px; padding-right: 4px; z-index: 20; transition: opacity 0.2s ease, transform 0.2s ease; } .icon-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text-dim); font-size: 12.5px; font-weight: 500; padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: color 0.15s ease, background-color 0.15s ease, transform 0.1s ease; } .icon-btn svg { width: 19px; height: 19px; flex-shrink: 0; } /* Import is a same-origin iframe containing nothing but a plain, default <input type="file"> — the exact minimal setup that was proven to work in isolation. Embedding it via iframe (instead of styling an input directly in the main page) sidesteps whatever it is about the main page's input handling that was silently swallowing the file picker's result. The selected File crosses back into the app via postMessage. */ .import-btn-wrap { position: relative; overflow: hidden; } .import-frame-overlay { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; opacity: 0; } .icon-btn:disabled { opacity: 0.35; } .icon-btn:not(:disabled):active { background: var(--surface-raised); transform: scale(0.94); } /* ---------- Stage ---------- */ #stage { position: fixed; left: 0; right: 0; top: calc(var(--top-bar-height) + var(--safe-top)); bottom: calc(var(--nav-height) + var(--safe-bottom)); background: var(--stage-bg); transition: top 0s, bottom 0s; /* snap instantly; chrome fade + photo-layer resize carry the animation */ } #zoom-viewport { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: manipulation; } #zoom-viewport.zoomed { display: block; overflow: auto; -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; } #canvas-stack { position: relative; display: inline-block; line-height: 0; font-size: 0; } .photo-layer { display: block; max-width: none; /* This is what makes zooming in/out AND the photo growing during fullscreen edit mode animate smoothly — a single cheap CSS rule instead of any JS-driven per-frame resize work. Draft-mode render during slider drags never changes width/height, only backing-store density, so it never triggers this transition. */ transition: width 0.22s var(--ease), height 0.22s var(--ease); } #photo-canvas-original { position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; } #canvas-stack.show-original #photo-canvas-original { opacity: 1; } #canvas-stack.show-original #photo-canvas { opacity: 0; } #empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--text-dim); pointer-events: none; } #empty-state.hidden { display: none; } .empty-title { font-size: 15px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text); margin: 0 0 10px; } .empty-hint { font-size: 14px; margin: 0; } /* ---------- Bottom navigation ---------- */ #bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; height: calc(var(--nav-height) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: stretch; z-index: 20; transition: opacity 0.2s ease, transform 0.2s ease; } .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 500; transition: color 0.15s ease, transform 0.1s ease; } .nav-tab svg { width: 22px; height: 22px; } .nav-tab:disabled { opacity: 0.35; } .nav-tab.active { color: var(--accent); } .nav-tab:not(:disabled):active { transform: scale(0.93); } .nav-indicator { position: absolute; top: 0; height: 2px; width: 0; left: 0; background: var(--accent); border-radius: 1px; opacity: 0; transition: left 0.25s var(--ease), width 0.25s var(--ease), opacity 0.15s ease; } .nav-indicator.visible { opacity: 1; } /* ---------- Drawers ---------- */ .drawer { position: fixed; left: 0; right: 0; bottom: calc(var(--nav-height) + var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform 0.25s var(--ease), opacity 0.2s ease; z-index: 10; padding: 10px 0 14px; } .drawer.open { transform: translateY(0); } .drawer-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 12px; transition: opacity 0.18s ease; } /* ---------- Looks drawer ---------- */ .looks-list { display: flex; gap: 12px; overflow-x: auto; padding: 0 16px; scrollbar-width: none; } .looks-list::-webkit-scrollbar { display: none; } .look-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 6px; background: none; border: none; padding: 0; transition: transform 0.1s ease; } .look-item:active { transform: scale(0.95); } .look-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; border: 2px solid transparent; background: var(--surface-raised); display: block; transition: border-color 0.15s ease; } .look-item.selected .look-thumb { border-color: var(--accent); } .look-name { font-size: 11px; color: var(--text-dim); max-width: 70px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } .look-item.selected .look-name { color: var(--accent); } /* ---------- Edit drawer (compact, Lightroom-style) ---------- */ .edit-drawer { padding-bottom: calc(10px + var(--safe-bottom)); } .edit-value-row { display: flex; align-items: baseline; gap: 8px; padding: 0 20px 8px; transition: opacity 0.18s ease; } .edit-active-label { font-size: 12.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; } .edit-active-value { font-size: 16px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; margin-left: auto; } .edit-reset-btn { margin-left: 10px; transition: opacity 0.18s ease; } .text-btn { background: none; border: none; color: var(--accent); font-size: 13px; font-weight: 500; padding: 6px 4px; } .text-btn:active { opacity: 0.6; } .edit-title { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); } /* ---------- Slider: bigger thumb, thicker fill, bubble tracks the drag ---------- */ .slider-wrap { position: relative; margin: 22px 20px 6px; } .adjust-slider { display: block; width: 100%; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: var(--border); outline: none; } .adjust-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); border: 3px solid var(--surface); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45); margin-top: -11px; transition: transform 0.12s ease, box-shadow 0.12s ease; } .adjust-slider::-moz-range-thumb { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); border: 3px solid var(--surface); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45); transition: transform 0.12s ease, box-shadow 0.12s ease; } .adjust-slider::-moz-range-track { height: 6px; border-radius: 3px; background: var(--border); } .slider-wrap.dragging .adjust-slider::-webkit-slider-thumb { transform: scale(1.15); box-shadow: 0 3px 12px rgba(0, 0, 0, 0.55); } .slider-wrap.dragging .adjust-slider::-moz-range-thumb { transform: scale(1.15); box-shadow: 0 3px 12px rgba(0, 0, 0, 0.55); } .slider-bubble { position: absolute; bottom: 100%; left: 0; transform: translate(-50%, -8px) scale(0.85); transform-origin: bottom center; background: var(--text); color: var(--surface); font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; padding: 4px 9px; border-radius: 7px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.12s ease, transform 0.12s ease; } .slider-bubble.visible { opacity: 1; transform: translate(-50%, -10px) scale(1); } .edit-tabs { display: flex; gap: 4px; overflow-x: auto; padding: 4px 16px 0; scrollbar-width: none; transition: opacity 0.18s ease; } .edit-tabs::-webkit-scrollbar { display: none; } .edit-tab { flex: 0 0 auto; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim); font-size: 12.5px; font-weight: 600; padding: 6px 10px 8px; white-space: nowrap; transition: color 0.15s ease, border-color 0.15s ease; } .edit-tab.active { color: var(--accent); border-bottom-color: var(--accent); } /* ---------- Lab drawer (architecture placeholder) ---------- */ .lab-header { padding: 0 20px 10px; } .lab-tools { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 4px; } .lab-chip { background: var(--surface-raised); color: var(--text-dim); font-size: 12.5px; font-weight: 500; padding: 8px 14px; border-radius: 20px; border: 1px dashed var(--border); opacity: 0.75; } .lab-note { padding: 10px 20px calc(4px + var(--safe-bottom)); font-size: 12px; color: var(--text-dim); line-height: 1.5; margin: 0; } /* ---------- Info drawer ---------- */ .info-drawer { max-height: 62vh; overflow-y: auto; -webkit-overflow-scrolling: touch; } .histogram-canvas { display: block; width: calc(100% - 40px); height: 90px; margin: 2px 20px 10px; } .info-list { padding: 0 20px calc(6px + var(--safe-bottom)); display: flex; flex-direction: column; } .info-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); } .info-row:last-child { border-bottom: none; } .info-label { font-size: 12.5px; color: var(--text-dim); } .info-value { font-size: 13.5px; color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; } </style> </head> <body> <script> // TEMPORARY DIAGNOSTIC — catches ANY uncaught JS error anywhere on the // page and shows it directly on screen, since we have no console access. window.addEventListener("error", function (e) { var div = document.createElement("div"); div.style.cssText = "position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;" + "padding:14px;z-index:999999;font-size:13px;white-space:pre-wrap;" + "font-family:monospace;line-height:1.5;"; div.textContent = "JS ERROR: " + e.message + "\n" + "file: " + (e.filename || "?") + "\n" + "line: " + (e.lineno || "?") + " col: " + (e.colno || "?"); document.body.appendChild(div); }); </script> <!-- Top bar: Import / Info / Export --> <header id="top-bar"> <div id="btn-import" class="icon-btn import-btn-wrap" aria-label="Importovat fotku"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"> <path d="M12 4v10M8 10l4 4 4-4"/> <path d="M5 18h14"/> </svg> <span>Import</span> </div> <button id="btn-info" class="icon-btn" disabled aria-label="Informace o fotografii"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"> <circle cx="12" cy="12" r="8.3"/> <line x1="12" y1="11" x2="12" y2="16"/> <circle cx="12" cy="8" r="0.6" fill="currentColor" stroke="none"/> </svg> <span>Info</span> </button> <button id="btn-export" class="icon-btn" disabled aria-label="Exportovat fotku"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"> <path d="M12 14V4M8 8l4-4 4 4"/> <path d="M5 18h14"/> </svg> <span>Export</span> </button> </header> <!-- Photo stage: canvas fills as much of the screen as possible --> <main id="stage"> <div id="zoom-viewport"> <!-- canvas-stack: two layers, exactly overlapping. #photo-canvas-original is pre-rendered and stays hidden (opacity:0) until a press-and-hold on the photo reveals it — a pure CSS swap, no redraw on demand. --> <div id="canvas-stack"> <canvas id="photo-canvas-original" class="photo-layer"></canvas> <canvas id="photo-canvas" class="photo-layer"></canvas> </div> </div> <div id="empty-state"> <p class="empty-title">Slate Lab</p> <p class="empty-hint">Klepni na Import a vyber fotku</p> </div> </main> <!-- Looks drawer --> <section id="looks-drawer" class="drawer" aria-hidden="true"> <div class="drawer-handle" id="looks-drawer-handle"></div> <div id="looks-list" class="looks-list"></div> </section> <!-- Edit drawer — compact, Lightroom-style: one slider whose target is chosen from the scrollable tab row underneath it. --> <section id="edit-drawer" class="drawer edit-drawer" aria-hidden="true"> <div class="drawer-handle" id="edit-drawer-handle"></div> <div class="edit-value-row"> <span id="edit-active-label" class="edit-active-label">Exposure</span> <span id="edit-active-value" class="edit-active-value">+0.0 EV</span> <button id="btn-reset-adjustments" class="text-btn edit-reset-btn">Reset</button> </div> <div class="slider-wrap" id="slider-wrap"> <div id="slider-bubble" class="slider-bubble">0</div> <input type="range" id="edit-slider" class="adjust-slider" min="-100" max="100" value="0"> </div> <div id="edit-tabs" class="edit-tabs"></div> </section> <!-- Lab drawer — architecture placeholder for future tools --> <section id="lab-drawer" class="drawer lab-drawer" aria-hidden="true"> <div class="drawer-handle" id="lab-drawer-handle"></div> <div class="lab-header"> <span class="edit-title">Lab</span> </div> <div id="lab-tools" class="lab-tools"></div> <p class="lab-note">Připravujeme: grain, fade, halation, color grading a ukládání vlastních looků.</p> </section> <!-- Info drawer — EXIF, resolution, file size, histogram --> <section id="info-drawer" class="drawer info-drawer" aria-hidden="true"> <div class="drawer-handle" id="info-drawer-handle"></div> <canvas id="histogram-canvas" class="histogram-canvas"></canvas> <div id="info-list" class="info-list"></div> </section> <!-- Bottom navigation: Looks / Edit / Lab --> <nav id="bottom-nav"> <div id="nav-indicator" class="nav-indicator" aria-hidden="true"></div> <button id="tab-looks" class="nav-tab" data-tab="looks" disabled> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"> <path d="M4 20L15 9"/> <path d="M17 3l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/> </svg> <span>Looks</span> </button> <button id="tab-edit" class="nav-tab" data-tab="edit" disabled> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"> <line x1="4" y1="7" x2="20" y2="7"/> <circle cx="9" cy="7" r="1.8" fill="currentColor" stroke="none"/> <line x1="4" y1="12" x2="20" y2="12"/> <circle cx="15" cy="12" r="1.8" fill="currentColor" stroke="none"/> <line x1="4" y1="17" x2="20" y2="17"/> <circle cx="11" cy="17" r="1.8" fill="currentColor" stroke="none"/> </svg> <span>Edit</span> </button> <button id="tab-lab" class="nav-tab" data-tab="lab" disabled> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"> <path d="M9 3h6M10 3v6l-5.3 9.2A1 1 0 0 0 5.6 20h12.8a1 1 0 0 0 .87-1.5L14 9V3"/> <path d="M7.6 14.5h8.8"/> </svg> <span>Lab</span> </button> </nav> <!-- ===== looks.js ===== --> <script> // looks.js // Pure data module. A "look" is just a name plus a CSS filter recipe. // It knows nothing about canvas, DOM, or files — this keeps it trivial // to add, tweak, or reorder looks without touching rendering code. // // filter uses the standard CSS <filter-function> syntax, applied to the // canvas context via ctx.filter. Keeping looks as filter strings (instead // of per-pixel math) keeps live preview fast enough to run on every // pointer/tap without any debouncing. // // No ES modules here on purpose — plain <script> tags loaded in order // (looks.js, engine.js, ui.js, app.js), sharing one namespace object, // so the app runs from a direct file:// open too, not just a local // server. Everything private to this file stays inside the IIFE; only // what's attached to SlateLab is visible to the other scripts. (function () { "use strict"; const SlateLab = (window.SlateLab = window.SlateLab || {}); const LOOKS = [ { id: "original", name: "Original", filter: "none", }, { id: "fuji-classic-chrome", name: "Classic Chrome", filter: "contrast(1.1) saturate(0.82) sepia(0.08) hue-rotate(-6deg) brightness(0.98)", }, { id: "fuji-provia", name: "Provia", filter: "contrast(1.05) saturate(1.08) brightness(1.02)", }, { id: "fuji-velvia", name: "Velvia", filter: "contrast(1.15) saturate(1.4) brightness(0.98)", }, { id: "fuji-acros", name: "Acros", filter: "grayscale(1) contrast(1.12) brightness(1.02)", }, { id: "faded-film", name: "Faded Film", filter: "contrast(0.92) saturate(0.85) sepia(0.15) brightness(1.05)", }, { id: "kodak-gold", name: "Kodak Gold", filter: "contrast(1.05) saturate(1.15) sepia(0.12) hue-rotate(-4deg) brightness(1.03)", }, ]; function getLookById(id) { return LOOKS.find((look) => look.id === id) ?? LOOKS[0]; } SlateLab.LOOKS = LOOKS; SlateLab.getLookById = getLookById; })(); </script> <!-- ===== engine.js ===== --> <script> // engine.js // Owns rendering, plus everything needed to describe the loaded photo // (metadata, EXIF, histogram). It never touches buttons or drawers. // // Rendering is a hybrid pipeline, deliberately: // 1. The Look is still a CSS filter (sepia/hue-rotate/etc, see looks.js) // — cheap, GPU-composited, applied via ctx.filter on drawImage. // 2. The 8 tonal adjustments (Exposure..White Balance) are a REAL // single-pass pixel engine over Uint8ClampedArray — proper exposure/ // contrast math and luminance-masked tone ranges, the same shape of // math Lightroom uses, instead of blanket CSS filter functions that // can't distinguish shadows from midtones from highlights at all. // Looks stay CSS-filter-based for now; converting them into engine // "recipes" (curves/color-matrix/split-toning) is the planned v3 step, // kept separate so the app is never in a half-broken state along the way. // // Two canvases are kept in sync — #photo-canvas (look + adjustments) and // #photo-canvas-original (untouched) — so "press and hold" in ui.js is a // pure CSS opacity swap, zero redraw cost. // // Performance: the pixel pass is now doing real work (8 operations per // pixel instead of 1), so while a slider is being dragged // (beginAdjustDrag/endAdjustDrag) rendering drops to a capped "draft" // resolution — the CSS box size never changes, so nothing
